trigger:
- main

pool:
  vmImage: 'macos-latest'

steps:
- script: |
    echo "Installed Xcodes:"
    ls -1 /Applications | grep Xcode
    echo "Current developer directory:"
    xcode-select -p
    xcodebuild -version
  displayName: 'Show installed Xcodes'

- task: CocoaPods@0
  displayName: 'Install CocoaPods Dependencies'
  inputs:
    workingDirectory: '$(System.DefaultWorkingDirectory)'
- script: |
   xcodebuild test \
      -workspace $(workspace) \
      -scheme $(scheme) \
      -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5'
  displayName: 'Run Unit Tests'

- task: Xcode@5
  displayName: 'Build iOS Application'
  inputs:
    actions: 'build'
    scheme: 'EBuyBooks'
    sdk: 'iphoneos'
    configuration: 'Release'
    xcWorkspacePath: 'EBuyBooks.xcworkspace'
    xcodeVersion: 'default'

