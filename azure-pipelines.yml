trigger:
- main

pool:
  vmImage: 'macos-latest'

steps:
- script: |
    echo "Installed Xcodes:"
    ls -1 /Applications | grep Xcode
    echo "Current developer directory:"
    xcode-select -p
    xcodebuild -version
  displayName: 'Show installed Xcodes'

- task: CocoaPods@0
  displayName: 'Install CocoaPods Dependencies'
  inputs:
    workingDirectory: '$(System.DefaultWorkingDirectory)'
    forceRepo: false

- task: Xcode@5
  displayName: 'Build iOS Application'
  inputs:
    actions: 'build'
    scheme: 'EBuyBooks'
    sdk: 'iphoneos'
    configuration: 'Release'
    xcWorkspacePath: '**/*.xcworkspace'
    xcodeVersion: 'default'

